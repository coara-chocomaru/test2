name: Build ARM64 Binary for Android 11+

on:
  push:
    branches: main
  pull_request:
    branches: main
  workflow_dispatch:

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r25c
      NDK_HOME: ${{ github.workspace }}/android-ndk-r25c
      TARGET_ABI: arm64-v8a
      API_LEVEL: android-31
      MODULE_NAME: avc_bypass
      SOURCE_FILE: avc_bypass.c

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK_HOME }}
          key: ndk-${{ env.NDK_VERSION }}-${{ runner.os }}

      - name: Download and setup Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip
          unzip -q android-ndk-${{ env.NDK_VERSION }}-linux.zip
          echo "${{ env.NDK_HOME }}" >> $GITHUB_PATH
          echo "NDK_HOME=${{ env.NDK_HOME }}" >> $GITHUB_ENV

      - name: Ensure source file exists
        run: |
          if [ ! -f "${{ env.SOURCE_FILE }}" ]; then
            C_FILE=$(ls *.c 2>/dev/null | head -n1)
            if [ -n "$C_FILE" ]; then
              echo "Renaming $C_FILE to ${{ env.SOURCE_FILE }}"
              mv "$C_FILE" "${{ env.SOURCE_FILE }}"
            else
              echo "Error: No .c file found!"
              exit 1
            fi
          fi
          echo "Source file: ${{ env.SOURCE_FILE }}"
          ls -la *.c *.h 2>/dev/null || true

      - name: Generate Android.mk
        run: |
          cat > Android.mk << 'EOF'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)

          LOCAL_MODULE := ${{ env.MODULE_NAME }}
          LOCAL_SRC_FILES := ${{ env.SOURCE_FILE }}

          LOCAL_CFLAGS := -fPIE -Wall -Wextra -O2 -Wno-unused-parameter -Wno-unused-variable -Wno-unused-function -pthread
          LOCAL_LDFLAGS := -fPIE -pie

          include $(BUILD_EXECUTABLE)
          EOF
          echo "Generated Android.mk:"
          cat Android.mk

      - name: Build with ndk-build
        run: |
          export PATH=${{ env.NDK_HOME }}/bin:$PATH
          ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=./Android.mk \
            APP_ABI=${{ env.TARGET_ABI }} \
            APP_PLATFORM=${{ env.API_LEVEL }} \
            -j$(nproc) \
            V=1

      - name: Verify and prepare binary for upload
        run: |
          EXPECTED_DIR="libs/${{ env.TARGET_ABI }}"
          EXPECTED_BIN="$EXPECTED_DIR/${{ env.MODULE_NAME }}"
          echo "Looking for binary at $EXPECTED_BIN"
          if [ -f "$EXPECTED_BIN" ]; then
            echo "Binary found."
            file "$EXPECTED_BIN"
            ls -la "$EXPECTED_BIN"
          else
            ALT_BIN=$(find libs -type f -executable 2>/dev/null | head -n1)
            if [ -n "$ALT_BIN" ]; then
              echo "Found alternative binary: $ALT_BIN"
              mkdir -p "$EXPECTED_DIR"
              mv "$ALT_BIN" "$EXPECTED_BIN"
              echo "Renamed to $EXPECTED_BIN"
            else
              echo "Error: No binary found in libs/"
              exit 1
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MODULE_NAME }}_arm64_android11
          path: libs/${{ env.TARGET_ABI }}/${{ env.MODULE_NAME }}
          if-no-files-found: error
