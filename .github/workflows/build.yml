name: Build ARM64 Binary for Android 11+

on:
  push:
    branches: test_shell
  pull_request:
    branches: test_shell
  workflow_dispatch:

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r25c
      NDK_HOME: ${{ github.workspace }}/android-ndk-r25c
      TARGET_ABI: arm64-v8a
      API_LEVEL: android-31
      MODULE_NAME: root_shell
      SOURCE_FILE: root_shell.c

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK_HOME }}
          key: ndk-${{ env.NDK_VERSION }}-${{ runner.os }}

      - name: Download and setup Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip
          unzip -q android-ndk-${{ env.NDK_VERSION }}-linux.zip
          echo "NDK_HOME=${{ env.NDK_HOME }}" >> $GITHUB_ENV
          echo "${{ env.NDK_HOME }}" >> $GITHUB_PATH


      - name: Build with ndk-build
        run: |
          export PATH="${{ env.NDK_HOME }}:${{ env.NDK_HOME }}/bin:$PATH"
          ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=./Android.mk \
            APP_ABI=${{ env.TARGET_ABI }} \
            APP_PLATFORM=${{ env.API_LEVEL }} \
            -j$(nproc) \
            V=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MODULE_NAME }}_arm64_android11
          path: libs/${{ env.TARGET_ABI }}/${{ env.MODULE_NAME }}
          if-no-files-found: error
