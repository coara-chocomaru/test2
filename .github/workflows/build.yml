name: Build ARM64 Binary for Android 11+

on:
  push:
    branches: shell
  pull_request:
    branches: shell
  workflow_dispatch:

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download and setup Android NDK r25c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "$(pwd)/android-ndk-r25c" >> $GITHUB_PATH
          echo "NDK_HOME=$(pwd)/android-ndk-r25c" >> $GITHUB_ENV

      - name: List workspace files (debug)
        run: |
          echo "Workspace contents:"
          ls -la
          echo "Android.mk contents:"
          cat Android.mk || echo "Android.mk not found"

      - name: Build with ndk-build
        run: |
          ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=./Android.mk \
            APP_ABI=arm64-v8a \
            APP_PLATFORM=android-31 \
            -j$(nproc)

      - name: Upload artifact (executable)
        uses: actions/upload-artifact@v4
        with:
          name: root_shell
          path: libs/arm64-v8a/root_shell
          if-no-files-found: error
